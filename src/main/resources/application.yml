spring:
  application:
    name: QuizJam

  config:
    import:
      - classpath:application-secret.yml

  sql:
    init:
      mode: never

  datasource:
    url: jdbc:h2:mem:test       # 인메모리 H2 (애플리케이션 실행 시 새로 생성됨)
    driver-class-name: org.h2.Driver
    username: sa
    password:                      # 기본 비밀번호 없음

    h2:
      console:
        enabled: true                # 웹 콘솔 활성화
        path: /h2-console

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update             # 스키마 자동 생성/갱신 (dev 환경만!)
    show-sql: true                 # 실행되는 SQL 보기
    properties:
      hibernate:
        format_sql: true           # SQL 예쁘게 출력

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "http://localhost:8081/kakao/callback"
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-seconds: 1800       # 30분
  refresh-token-validity-in-seconds: 2592000   # 30일