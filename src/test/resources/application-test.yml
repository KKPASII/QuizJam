spring:
  application:
    name: QuizJam
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-client-id
            client-secret: test-client-secret
            redirect-uri: http://localhost:8081/api/kakao/callback
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: test-jwt-secret-key-test-jwt-secret-key-test-jwt-secret-key
  access-token-validity-in-seconds: 1800
  refresh-token-validity-in-seconds: 2592000

openai:
  api-key: test-openai-api-key
  api-url: https://api.openai.com/v1/chat/completions
  model: gpt-4o-mini
